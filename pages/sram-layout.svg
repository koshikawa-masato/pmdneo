<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">per-part SRAM 64 byte layout</title>
  <desc id="desc">offset 0 から 63 までの 64 byte block。既存 field、loop stack、loop depth、新規 hook pointer、予備領域を表示。</desc>
  <defs>
    <style>
      .bg { fill: #fbfcff; }
      .cell { stroke: #5b6470; stroke-width: 1; }
      .existing { fill: #dfe4ea; }
      .unused { fill: #ffffff; }
      .loop0 { fill: #dff4e8; }
      .loop1 { fill: #c7ead8; }
      .loop2 { fill: #afdcbc; }
      .loop3 { fill: #98cfae; }
      .depth { fill: #fff0a8; }
      .hook { fill: #ffd9df; stroke: #c93f4d; stroke-width: 1.6; }
      .reserve { fill: #ffffff; }
      .legend { stroke: #5b6470; stroke-width: 1; rx: 4; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; fill: #1c2430; }
      .h { font-weight: 800; font-size: 18px; }
      .m { font-weight: 700; font-size: 13px; }
      .s { font-size: 9px; }
      .xs { font-size: 8px; fill: #344054; }
      .label { font-size: 12px; font-weight: 800; fill: #8f1d2a; }
    </style>
  </defs>
  <rect class="bg" width="800" height="400"/>
  <text x="34" y="34" class="h">per-part SRAM 64 byte layout</text>
  <text x="34" y="55" class="m">既存 PART_OFF_* 25 field は 0-24 のまま維持。新規 hook pointer は 49-56 に追加。</text>

  <g transform="translate(34 82)">
    <rect x="0" y="0" width="46" height="46" class="cell existing"/><text x="5" y="13" class="s">00</text><text x="23" y="29" text-anchor="middle" class="xs">CUR</text>
    <rect x="46" y="0" width="46" height="46" class="cell existing"/><text x="51" y="13" class="s">01</text><text x="69" y="29" text-anchor="middle" class="xs">PTR</text>
    <rect x="92" y="0" width="46" height="46" class="cell existing"/><text x="97" y="13" class="s">02</text><text x="115" y="29" text-anchor="middle" class="xs">PTR</text>
    <rect x="138" y="0" width="46" height="46" class="cell existing"/><text x="143" y="13" class="s">03</text><text x="161" y="29" text-anchor="middle" class="xs">LEN</text>
    <rect x="184" y="0" width="46" height="46" class="cell existing"/><text x="189" y="13" class="s">04</text><text x="207" y="29" text-anchor="middle" class="xs">TONE</text>
    <rect x="230" y="0" width="46" height="46" class="cell existing"/><text x="235" y="13" class="s">05</text><text x="253" y="29" text-anchor="middle" class="xs">VOL</text>
    <rect x="276" y="0" width="46" height="46" class="cell existing"/><text x="281" y="13" class="s">06</text><text x="299" y="29" text-anchor="middle" class="xs">OCT</text>
    <rect x="322" y="0" width="46" height="46" class="cell existing"/><text x="327" y="13" class="s">07</text><text x="345" y="29" text-anchor="middle" class="xs">DET</text>
    <rect x="368" y="0" width="46" height="46" class="cell existing"/><text x="373" y="13" class="s">08</text><text x="391" y="29" text-anchor="middle" class="xs">PAN</text>
    <rect x="414" y="0" width="46" height="46" class="cell existing"/><text x="419" y="13" class="s">09</text><text x="437" y="29" text-anchor="middle" class="xs">CH</text>
    <rect x="460" y="0" width="46" height="46" class="cell existing"/><text x="465" y="13" class="s">10</text><text x="483" y="29" text-anchor="middle" class="xs">FLG</text>
    <rect x="506" y="0" width="46" height="46" class="cell existing"/><text x="511" y="13" class="s">11</text><text x="529" y="29" text-anchor="middle" class="xs">CMD</text>
    <rect x="552" y="0" width="46" height="46" class="cell existing"/><text x="557" y="13" class="s">12</text><text x="575" y="29" text-anchor="middle" class="xs">ENV</text>
    <rect x="598" y="0" width="46" height="46" class="cell existing"/><text x="603" y="13" class="s">13</text><text x="621" y="29" text-anchor="middle" class="xs">ENV</text>
    <rect x="644" y="0" width="46" height="46" class="cell existing"/><text x="649" y="13" class="s">14</text><text x="667" y="29" text-anchor="middle" class="xs">LFO</text>
    <rect x="690" y="0" width="46" height="46" class="cell existing"/><text x="695" y="13" class="s">15</text><text x="713" y="29" text-anchor="middle" class="xs">LFO</text>

    <rect x="0" y="46" width="46" height="46" class="cell existing"/><text x="5" y="59" class="s">16</text><text x="23" y="75" text-anchor="middle" class="xs">GATE</text>
    <rect x="46" y="46" width="46" height="46" class="cell existing"/><text x="51" y="59" class="s">17</text><text x="69" y="75" text-anchor="middle" class="xs">SLUR</text>
    <rect x="92" y="46" width="46" height="46" class="cell existing"/><text x="97" y="59" class="s">18</text><text x="115" y="75" text-anchor="middle" class="xs">REST</text>
    <rect x="138" y="46" width="46" height="46" class="cell existing"/><text x="143" y="59" class="s">19</text><text x="161" y="75" text-anchor="middle" class="xs">FNUM</text>
    <rect x="184" y="46" width="46" height="46" class="cell existing"/><text x="189" y="59" class="s">20</text><text x="207" y="75" text-anchor="middle" class="xs">FNUM</text>
    <rect x="230" y="46" width="46" height="46" class="cell existing"/><text x="235" y="59" class="s">21</text><text x="253" y="75" text-anchor="middle" class="xs">LEN2</text>
    <rect x="276" y="46" width="46" height="46" class="cell existing"/><text x="281" y="59" class="s">22</text><text x="299" y="75" text-anchor="middle" class="xs">TIE</text>
    <rect x="322" y="46" width="46" height="46" class="cell existing"/><text x="327" y="59" class="s">23</text><text x="345" y="75" text-anchor="middle" class="xs">AUX</text>
    <rect x="368" y="46" width="46" height="46" class="cell existing"/><text x="373" y="59" class="s">24</text><text x="391" y="75" text-anchor="middle" class="xs">AUX</text>
    <rect x="414" y="46" width="46" height="46" class="cell unused"/><text x="419" y="59" class="s">25</text><text x="437" y="75" text-anchor="middle" class="xs">unused</text>
    <rect x="460" y="46" width="46" height="46" class="cell unused"/><text x="465" y="59" class="s">26</text><text x="483" y="75" text-anchor="middle" class="xs">unused</text>
    <rect x="506" y="46" width="46" height="46" class="cell unused"/><text x="511" y="59" class="s">27</text><text x="529" y="75" text-anchor="middle" class="xs">unused</text>
    <rect x="552" y="46" width="46" height="46" class="cell unused"/><text x="557" y="59" class="s">28</text><text x="575" y="75" text-anchor="middle" class="xs">unused</text>
    <rect x="598" y="46" width="46" height="46" class="cell unused"/><text x="603" y="59" class="s">29</text><text x="621" y="75" text-anchor="middle" class="xs">unused</text>
    <rect x="644" y="46" width="46" height="46" class="cell unused"/><text x="649" y="59" class="s">30</text><text x="667" y="75" text-anchor="middle" class="xs">unused</text>
    <rect x="690" y="46" width="46" height="46" class="cell unused"/><text x="695" y="59" class="s">31</text><text x="713" y="75" text-anchor="middle" class="xs">unused</text>

    <rect x="0" y="92" width="46" height="46" class="cell loop0"/><text x="5" y="105" class="s">32</text><text x="23" y="121" text-anchor="middle" class="xs">LOOP0</text>
    <rect x="46" y="92" width="46" height="46" class="cell loop0"/><text x="51" y="105" class="s">33</text><text x="69" y="121" text-anchor="middle" class="xs">LOOP0</text>
    <rect x="92" y="92" width="46" height="46" class="cell loop0"/><text x="97" y="105" class="s">34</text><text x="115" y="121" text-anchor="middle" class="xs">LOOP0</text>
    <rect x="138" y="92" width="46" height="46" class="cell loop0"/><text x="143" y="105" class="s">35</text><text x="161" y="121" text-anchor="middle" class="xs">LOOP0</text>
    <rect x="184" y="92" width="46" height="46" class="cell loop1"/><text x="189" y="105" class="s">36</text><text x="207" y="121" text-anchor="middle" class="xs">LOOP1</text>
    <rect x="230" y="92" width="46" height="46" class="cell loop1"/><text x="235" y="105" class="s">37</text><text x="253" y="121" text-anchor="middle" class="xs">LOOP1</text>
    <rect x="276" y="92" width="46" height="46" class="cell loop1"/><text x="281" y="105" class="s">38</text><text x="299" y="121" text-anchor="middle" class="xs">LOOP1</text>
    <rect x="322" y="92" width="46" height="46" class="cell loop1"/><text x="327" y="105" class="s">39</text><text x="345" y="121" text-anchor="middle" class="xs">LOOP1</text>
    <rect x="368" y="92" width="46" height="46" class="cell loop2"/><text x="373" y="105" class="s">40</text><text x="391" y="121" text-anchor="middle" class="xs">LOOP2</text>
    <rect x="414" y="92" width="46" height="46" class="cell loop2"/><text x="419" y="105" class="s">41</text><text x="437" y="121" text-anchor="middle" class="xs">LOOP2</text>
    <rect x="460" y="92" width="46" height="46" class="cell loop2"/><text x="465" y="105" class="s">42</text><text x="483" y="121" text-anchor="middle" class="xs">LOOP2</text>
    <rect x="506" y="92" width="46" height="46" class="cell loop2"/><text x="511" y="105" class="s">43</text><text x="529" y="121" text-anchor="middle" class="xs">LOOP2</text>
    <rect x="552" y="92" width="46" height="46" class="cell loop3"/><text x="557" y="105" class="s">44</text><text x="575" y="121" text-anchor="middle" class="xs">LOOP3</text>
    <rect x="598" y="92" width="46" height="46" class="cell loop3"/><text x="603" y="105" class="s">45</text><text x="621" y="121" text-anchor="middle" class="xs">LOOP3</text>
    <rect x="644" y="92" width="46" height="46" class="cell loop3"/><text x="649" y="105" class="s">46</text><text x="667" y="121" text-anchor="middle" class="xs">LOOP3</text>
    <rect x="690" y="92" width="46" height="46" class="cell loop3"/><text x="695" y="105" class="s">47</text><text x="713" y="121" text-anchor="middle" class="xs">LOOP3</text>

    <rect x="0" y="138" width="46" height="46" class="cell depth"/><text x="5" y="151" class="s">48</text><text x="23" y="167" text-anchor="middle" class="xs">DEPTH</text>
    <rect x="46" y="138" width="46" height="46" class="cell hook"/><text x="51" y="151" class="s">49</text><text x="69" y="165" text-anchor="middle" class="xs">HOOK</text><text x="69" y="176" text-anchor="middle" class="xs">KEYON</text>
    <rect x="92" y="138" width="46" height="46" class="cell hook"/><text x="97" y="151" class="s">50</text><text x="115" y="165" text-anchor="middle" class="xs">HOOK</text><text x="115" y="176" text-anchor="middle" class="xs">KEYON</text>
    <rect x="138" y="138" width="46" height="46" class="cell hook"/><text x="143" y="151" class="s">51</text><text x="161" y="165" text-anchor="middle" class="xs">HOOK</text><text x="161" y="176" text-anchor="middle" class="xs">KEYOFF</text>
    <rect x="184" y="138" width="46" height="46" class="cell hook"/><text x="189" y="151" class="s">52</text><text x="207" y="165" text-anchor="middle" class="xs">HOOK</text><text x="207" y="176" text-anchor="middle" class="xs">KEYOFF</text>
    <rect x="230" y="138" width="46" height="46" class="cell hook"/><text x="235" y="151" class="s">53</text><text x="253" y="165" text-anchor="middle" class="xs">HOOK</text><text x="253" y="176" text-anchor="middle" class="xs">FNUM</text>
    <rect x="276" y="138" width="46" height="46" class="cell hook"/><text x="281" y="151" class="s">54</text><text x="299" y="165" text-anchor="middle" class="xs">HOOK</text><text x="299" y="176" text-anchor="middle" class="xs">FNUM</text>
    <rect x="322" y="138" width="46" height="46" class="cell hook"/><text x="327" y="151" class="s">55</text><text x="345" y="165" text-anchor="middle" class="xs">HOOK</text><text x="345" y="176" text-anchor="middle" class="xs">VOL</text>
    <rect x="368" y="138" width="46" height="46" class="cell hook"/><text x="373" y="151" class="s">56</text><text x="391" y="165" text-anchor="middle" class="xs">HOOK</text><text x="391" y="176" text-anchor="middle" class="xs">VOL</text>
    <rect x="414" y="138" width="322" height="46" class="cell reserve"/><text x="419" y="151" class="s">57-63</text><text x="575" y="167" text-anchor="middle" class="m">予備 7 byte</text>
    <text x="253" y="211" text-anchor="middle" class="label">★ 新規 hook pointer: offsets 49-56</text>
  </g>

  <g transform="translate(34 326)">
    <rect x="0" y="0" width="18" height="18" class="legend existing"/><text x="26" y="14" class="s">既存 PART_OFF_* (0-24)</text>
    <rect x="178" y="0" width="18" height="18" class="legend unused"/><text x="204" y="14" class="s">未使用 / 予備</text>
    <rect x="298" y="0" width="18" height="18" class="legend loop1"/><text x="324" y="14" class="s">LOOPSTACK (32-47)</text>
    <rect x="462" y="0" width="18" height="18" class="legend depth"/><text x="488" y="14" class="s">LOOPDEPTH (48)</text>
    <rect x="604" y="0" width="18" height="18" class="legend hook"/><text x="630" y="14" class="s">新規 hook (49-56)</text>
