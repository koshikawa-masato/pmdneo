<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">NEOGEO Z80 メモリマップ</title>
  <desc id="desc">Z80 の 64 KB address space を左の縦 bar に、0xF800 から 0xFFFF の Z80 SRAM 詳細を右の拡大 bar に表示。</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        fill: #202124;
      }
      .title { font-size: 26px; font-weight: 800; }
      .subtitle { font-size: 13px; fill: #5f6368; }
      .label { font-size: 13px; font-weight: 700; }
      .small { font-size: 11px; fill: #3c4043; }
      .tiny { font-size: 9px; fill: #5f6368; }
      .addr { font-size: 11px; fill: #3c4043; font-family: "SF Mono", Menlo, Consolas, monospace; }
      .bar-border { fill: none; stroke: #2f3a45; stroke-width: 1.5; }
      .tick { stroke: #2f3a45; stroke-width: 1; }
      .guide { stroke: #7b8794; stroke-width: 1; stroke-dasharray: 3 3; }
      .connector { fill: none; stroke: #2f3a45; stroke-width: 1.5; }
      .m1 { fill: #4A90D9; }
      .bank { fill: #B0B0B0; }
      .sram { fill: #4CAF50; }
      .driver { fill: #FFD600; }
      .part { fill: #E53935; stroke: #a71919; stroke-width: 2; }
      .unused { fill: #ffffff; stroke: #F5F5F5; stroke-width: 2; }
      .bios { fill: #212121; }
      .spacer { fill: #f7f9fb; stroke: #d9e1e8; stroke-width: 1; }
      .chip { font-size: 14px; font-weight: 800; fill: #1f2933; }
    </style>
  </defs>

  <rect width="800" height="600" fill="#fbfcff"/>
  <text x="40" y="42" class="title">NEOGEO Z80 メモリマップ</text>
  <text x="40" y="64" class="subtitle">Z80A @ 4 MHz / 16-bit address bus (64 KB max)</text>

  <g id="full-address-space">
    <text x="80" y="88" class="label">Z80 64 KB address space</text>
    <rect x="80" y="108" width="110" height="450" class="bar-border"/>
    <rect x="80" y="108" width="110" height="421.875" class="m1"/>
    <rect x="80" y="529.875" width="110" height="14.0625" class="bank"/>
    <rect x="80" y="543.9375" width="110" height="14.0625" class="sram"/>
    <rect x="80" y="108" width="110" height="450" class="bar-border"/>

    <line x1="72" y1="108" x2="80" y2="108" class="tick"/>
    <line x1="72" y1="529.875" x2="80" y2="529.875" class="tick"/>
    <line x1="72" y1="543.9375" x2="80" y2="543.9375" class="tick"/>
    <line x1="72" y1="558" x2="80" y2="558" class="tick"/>
    <text x="34" y="112" class="addr">0x0000</text>
    <text x="34" y="533" class="addr">0xF000</text>
    <text x="34" y="547" class="addr">0xF800</text>
    <text x="34" y="562" class="addr">0xFFFF</text>

    <text x="205" y="302" class="label">M1 ROM 128 KB (cart)</text>
    <text x="205" y="321" class="small">0x0000-0xEFFF / 60 KB window</text>
    <text x="205" y="340" class="small">driver code + tables</text>

    <line x1="190" y1="536.9" x2="205" y2="536.9" class="guide"/>
    <text x="210" y="535" class="label">bank window 2 KB</text>
    <text x="210" y="550" class="small">0xF000-0xF7FF</text>

    <line x1="190" y1="551" x2="205" y2="551" class="guide"/>
    <text x="210" y="570" class="label">Z80 SRAM 2 KB (本体内)</text>
    <text x="210" y="585" class="small">0xF800-0xFFFF / work RAM</text>

    <text x="80" y="584" class="chip">cart内 M1 ROM chip</text>
  </g>

  <g id="sram-zoom">
    <text x="455" y="88" class="label">SRAM zoom (2 KB = 2048 byte)</text>
    <rect x="455" y="108" width="120" height="420" class="bar-border"/>
    <rect x="455" y="108" width="120" height="3.28125" class="spacer"/>
    <rect x="455" y="111.28125" width="120" height="3.28125" class="driver"/>
    <rect x="455" y="114.5625" width="120" height="223.125" class="part"/>
    <rect x="455" y="337.6875" width="120" height="189.90234" class="unused"/>
    <rect x="455" y="527.58984" width="120" height="0.41016" class="bios"/>
    <rect x="455" y="108" width="120" height="420" class="bar-border"/>

    <line x1="575" y1="108" x2="590" y2="108" class="tick"/>
    <line x1="575" y1="111.28125" x2="590" y2="111.28125" class="tick"/>
    <line x1="575" y1="114.5625" x2="590" y2="114.5625" class="tick"/>
    <line x1="575" y1="337.6875" x2="590" y2="337.6875" class="tick"/>
    <line x1="575" y1="527.58984" x2="590" y2="527.58984" class="tick"/>
    <line x1="575" y1="528" x2="590" y2="528" class="tick"/>

    <text x="598" y="113" class="addr">0xF800-0xF80F</text>
    <text x="598" y="127" class="tiny">reserved 16 byte</text>

    <text x="598" y="153" class="addr">0xF810-0xF81F</text>
    <text x="598" y="168" class="label">driver state 16 byte</text>
    <text x="598" y="183" class="small">tempo / fade / song flag 等</text>

    <text x="598" y="235" class="addr">0xF820-0xFC5F</text>
    <text x="598" y="253" class="label">part_workarea 1,088 byte</text>
    <text x="598" y="270" class="small">17 part × 64 byte per-part state</text>

    <text x="598" y="426" class="addr">0xFC60-0xFFFD</text>
    <text x="598" y="444" class="label">未使用 926 byte</text>
    <text x="598" y="461" class="small">予備領域</text>

    <text x="598" y="510" class="addr">0xFFFE-0xFFFF</text>
    <text x="598" y="525" class="label">SM1 BIOS 2 byte</text>
    <text x="598" y="540" class="small">BIOS reserve</text>

    <text x="455" y="584" class="chip">NEOGEO本体 SRAM chip</text>
  </g>

  <path d="M 190 543.9375 L 360 543.9375 L 430 108 L 455 108" class="connector"/>
  <path d="M 190 558 L 360 558 L 430 528 L 455 528" class="connector"/>
  <path d="M 430 108 L 430 528" class="connector"/>
  <text x="313" y="534" class="small">0xF800-0xFFFF を拡大</text>
</svg>
