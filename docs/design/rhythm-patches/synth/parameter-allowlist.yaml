# Parameter allowlist for template `.fxp` patching (= ADR-0033 §決定 27 (9) ξ/π artifact)
# ============================================================================
#
# 本 file は AI bridge が `2608_template.fxp` 内で touch 可能な parameter を
# literal に enumerate する allowlist。 「parameter allowlist patching」 軸の
# literal 制約 (= ξ/π 中核 wording 連動)。
#
# 23rd session π 軸転換 (= 2026-05-16):
#   旧 (ξ): byte offset patching (= template binary diff で offset 同定 → byte overwrite)
#   新 (π): XML element name patching (= Surge XT chunk 内 XML body の element value 修正)
#   根拠: template (= Init Sine.fxp) chunk 内部 = sub3 magic + binary header + XML + trailing binary
#         確認、 XML element name + value attribute 経由で安全 patching 可能、 byte offset 不要
#
# allowlist 外の XML element は **change_protected** = AI bridge が触らない。
# conservative default = 「明示的に許可された XML element name のみ value 書換可能」。
#
# 関連 ADR / §決定:
#   - ADR-0033 §決定 26  (= .fxp authoring spec 7 軸)
#   - ADR-0033 §決定 27 (1)  (= AI 役割 5 軸、 π で template acquisition + XML-based bridge)
#   - ADR-0033 §決定 27 (9)  (= ξ/π artifact path canonical)
#   - ADR-0033 §決定 27 (11) (= ξ/π scope-in literal「patching 対象 parameter の allowlist」)
#
# ============================================================================

allowlist_version: "0.3.0"           # π2 改訂 = XML element name 実測値 partial fill
status: partial-fill-core-elements    # pending-xml-parameter-survey | partial-fill-core-elements | active | superseded
template_ref: ./template.fxp.provenance.yaml
patching_model: xml-element-name      # byte-offset (旧 ξ) | xml-element-name (新 π)
template_total_param_count: 558       # π2 survey-params 実測値
allowlist_coverage_target: "patch-spec.yaml 主要 field 対応の核心 30-50 element (= π3 で full enumeration 検討)"

# ---------------------------------------------------------------------------
# 許可 parameter list (= AI bridge が touch 可能、 XML element name 軸)
# ---------------------------------------------------------------------------
# π2 commit (= XML parameter survey) で fill 予定:
#   (a) template chunk 内 XML を extract
#   (b) <parameters> 要素配下の element 一覧 dump
#   (c) candidate 6 category に該当する element name を allowlist に列挙
#   (d) 各 element の type + valid_range + default_value を XML から確定
allowed_parameters:
  # ★ π2 partial fill = 主要 patch-spec field 対応の核心 element のみ enumerate。
  # 実 valid_range は Surge XT documentation 別途調査必要 (= XML 内 type/value のみ confirm 可)。
  # template (= Init Sine.fxp) からの実測 default_value を記録、 各 element は π2 survey-params で literal 確認済。
  # 主要 7 group = (a) amp envelope (b) filter env (c) osc1 (d) filter1 (e) master volume (f) scene volume (g) overall volume

  # (a) Amplitude Envelope (= AEG) = a_env1_* (template 実測 8 element)
  - xml_element_name: a_env1_attack
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "-8.00000000000000"
    patch_spec_field: amplitude_envelope.attack_ms
    notes: "AEG attack segment、 Surge XT 内部単位 (= 多分 log-time scale)、 valid_range は Surge XT 仕様要調査"

  - xml_element_name: a_env1_decay
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "-2.00000000000000"
    patch_spec_field: amplitude_envelope.decay_ms
    notes: "AEG decay segment"

  - xml_element_name: a_env1_sustain
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: amplitude_envelope.sustain_level
    notes: "AEG sustain level (= 0.0-1.0 normalized)"

  - xml_element_name: a_env1_release
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "-5.00000000000000"
    patch_spec_field: amplitude_envelope.release_ms
    notes: "AEG release segment"

  # (b) Filter Envelope (= FEG) = a_env2_* (template 実測 8 element、 用途次第で pitch envelope 代用)
  - xml_element_name: a_env2_attack
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "-8.00000000000000"
    patch_spec_field: pitch_envelope.duration_ms (= optional via FEG)
    notes: "FEG attack、 patch-spec pitch_envelope へ modulation 経路で接続"

  - xml_element_name: a_env2_decay
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "-2.00000000000000"
    patch_spec_field: pitch_envelope.duration_ms (= optional via FEG)
    notes: "FEG decay"

  # (c) Oscillator 1 = a_osc1_* (template 実測 12 element、 主要 6 element のみ enumerate)
  - xml_element_name: a_osc1_type
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[0].type
    notes: "Surge XT osc type enum (= 0:Classic / 1:Sine / 2:Wavetable / ...)、 type=0 で integer enum"

  - xml_element_name: a_osc1_octave
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[0].pitch_offset_octaves
    notes: "OSC1 octave shift、 integer"

  - xml_element_name: a_osc1_pitch
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[0].base_pitch_offset_semitones
    notes: "OSC1 pitch (= semitone fractional)、 extend_range attribute あり"

  # (d) Filter 1 = a_filter1_* (template 実測 6 element)
  - xml_element_name: a_filter1_type
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: filter_waveshaper_drive.filter_block.type
    notes: "Surge XT filter type enum"

  - xml_element_name: a_filter1_cutoff
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "3.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_block.cutoff_hz
    notes: "filter cutoff、 Surge XT 内部単位 (= log-frequency scale 想定)、 仕様要確認"

  - xml_element_name: a_filter1_resonance
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_block.resonance
    notes: "filter resonance (= 0.0-1.0 normalized)"

  # (e) Master / scene volume = volume / a_volume / b_volume (template 実測 3 element)
  - xml_element_name: volume
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "-9.68199920654297"
    patch_spec_field: output_constraint.peak_target_dbfs (= 整合 必要時)
    notes: "master output volume (= dB?)、 §決定 26 (4) peak target 整合は patch-spec 側で別途検証"

  - xml_element_name: a_volume
    xml_value_attribute: value
    xml_type_attribute: type
    xml_type_value: "2"
    template_default_value: "0.89089900255203"
    patch_spec_field: oscillator_plan.scene_a_master (= optional)
    notes: "scene A master volume、 deactivated attribute あり"

  # ★ 残り未 enumerate element (= 558 - 14 = 544 件) は default で change_protected。
  # π3 commit で full enumeration + patch-spec 全 field との 1:1 mapping 完成予定。

# ---------------------------------------------------------------------------
# 候補 parameter (= 越川氏 audition で確定、 §決定 26 (5) + §決定 27 推奨 baseline)
# ---------------------------------------------------------------------------
# template + parameter patching で全 6 drum 種 (= BD/SD/TOP/HH/TOM/RIM) を表現するための
# 最小 parameter set 候補。 越川氏 hand-on 時にこの中から「実 patching 対象」 を選別。
candidate_parameters_for_allowlist:
  - category: oscillator
    parameters:
      - osc1_waveform           # OSC type (= Classic / Sine / FM2 等の選択)
      - osc1_pitch_offset       # pitch base shift
      - osc1_amplitude          # OSC 1 gain
      - osc2_waveform
      - osc2_pitch_offset
      - osc2_amplitude
  - category: amp_envelope
    parameters:
      - amp_envelope_attack     # AHDSR A
      - amp_envelope_hold       # AHDSR H
      - amp_envelope_decay      # AHDSR D
      - amp_envelope_sustain    # AHDSR S
      - amp_envelope_release    # AHDSR R
  - category: pitch_envelope
    parameters:
      - pitch_envelope_amount   # pitch env modulation depth
      - pitch_envelope_decay    # pitch env decay ms
  - category: filter
    parameters:
      - filter1_cutoff_hz       # LP cutoff
      - filter1_resonance       # filter Q
      - filter1_envelope_amount
  - category: waveshaper_drive
    parameters:
      - waveshaper_drive_db     # saturation amount
  - category: master
    parameters:
      - master_gain             # patch level (= -6 〜 -3 dBFS peak 整合)

# ---------------------------------------------------------------------------
# 禁止領域 (= 永久 change_protected、 §決定 27 ξ/π scope-out 連動)
# ---------------------------------------------------------------------------
prohibited_byte_ranges:
  - range: [0, 28]
    description: "VST2 container header (= CcnK + byteSize + fxMagic + version + idUint + fxVersion + count)"
    reason: "§決定 27 ξ scope-out: full binary RE 最小限維持、 container 軸は touch 不可"
  - range: [56, 60]
    description: "FPCh chunkByteSize (= patch chunk size header)"
    reason: "XML patching で byte size 変動時は再計算、 それ以外は不変"
  - range: [60, 92]
    description: "FPCh chunk sub3 magic + 28 byte binary header"
    reason: "Surge XT 内部 chunk format marker、 AI bridge は touch しない (= 「bridge, not full synthesizer patch compiler」 軸)"
  # ★ ο1 「chunk 末尾 8 byte trailing」 entry を π2 で削除:
  # verify-repack 実測で trailing = 0 byte 確認、 protected zone 不要。

prohibited_xml_elements:
  - xml_path: "/patch/meta/license"
    description: "license element、 CC0 narrative 維持 = bridge で書換禁止"
  - xml_path: "/patch/meta/author"
    description: "author element、 Surge Synth Team 由来表記維持"
  - xml_path: "/patch[@revision]"
    description: "patch revision attribute、 Surge XT 内部 schema version 識別子、 触らない"

allowed_xml_modifications:
  - xml_path: "/patch/meta/name"
    description: "drum-specific name で書換可 (= 例 'Init Sine' → 'PMDNEO 2608 BD candidate')"
    note: "string replace、 byte size 不変なら chunkByteSize 再計算不要"
  - xml_path: "/patch/meta/category"
    description: "category 書換可 (= 例 'Templates' → 'PMDNEO Drum')"

# ---------------------------------------------------------------------------
# patching 規律 (= AI bridge が遵守する rule、 XML 軸 + binary 軸)
# ---------------------------------------------------------------------------
patching_discipline:
  - "XML allowlist 外の element は **完全に touch しない** (= XML serialize で byte-identical 維持)"
  - "XML allowlist 内の element の value attribute のみ修正 (= 他 attribute 不変)"
  - "valid_range 外の値は **reject** (= patch-spec の value validation in bridge layer)"
  - "XML 修正後 byte size 変動なら chunkByteSize + VST2 byteSize の 2 か所再計算 (= chunkByteSize + 8 = byteSize 維持)"
  - "patching 失敗時は `.fxp` を作らず error exit (= 「engineering candidate before aesthetic judgement」 整合)"
  - "patching 前後で prohibited_xml_elements + prohibited_byte_ranges が byte-identical であることを verify"
  - "trailing binary (= chunk 末尾 8 byte) は **完全に保存** (= XML 後の Surge XT 内部 binary 領域、 corruption 回避)"

# ---------------------------------------------------------------------------
# 関連 artifact
# ---------------------------------------------------------------------------
related_artifacts:
  template_fxp: assets/drum_samples/synth/templates/2608_template.fxp
  template_provenance: docs/design/rhythm-patches/synth/template.fxp.provenance.yaml
  investigation_doc: docs/design/rhythm-patches/synth/SURGE_XT_FXP_BRIDGE_INVESTIGATION.md
  bridge_spike: scripts/fxp_template_patch.py
  example_consumer_patch_spec: docs/design/rhythm-patches/synth/2608_bd.patch-spec.yaml

