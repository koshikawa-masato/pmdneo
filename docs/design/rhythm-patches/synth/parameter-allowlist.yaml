# Parameter allowlist for template `.fxp` patching (= ADR-0033 §決定 27 (9) ξ/π artifact)
# ============================================================================
#
# 本 file は AI bridge が `2608_template.fxp` 内で touch 可能な parameter を
# literal に enumerate する allowlist。 「parameter allowlist patching」 軸の
# literal 制約 (= ξ/π 中核 wording 連動)。
#
# 23rd session π 軸転換 (= 2026-05-16):
#   旧 (ξ): byte offset patching (= template binary diff で offset 同定 → byte overwrite)
#   新 (π): XML element name patching (= Surge XT chunk 内 XML body の element value 修正)
#   根拠: template (= Init Sine.fxp) chunk 内部 = sub3 magic + binary header + XML + trailing binary
#         確認、 XML element name + value attribute 経由で安全 patching 可能、 byte offset 不要
#
# allowlist 外の XML element は **change_protected** = AI bridge が触らない。
# conservative default = 「明示的に許可された XML element name のみ value 書換可能」。
#
# 関連 ADR / §決定:
#   - ADR-0033 §決定 26  (= .fxp authoring spec 7 軸)
#   - ADR-0033 §決定 27 (1)  (= AI 役割 5 軸、 π で template acquisition + XML-based bridge)
#   - ADR-0033 §決定 27 (9)  (= ξ/π artifact path canonical)
#   - ADR-0033 §決定 27 (11) (= ξ/π scope-in literal「patching 対象 parameter の allowlist」)
#
# ============================================================================

allowlist_version: "0.4.0"           # π3 改訂 = comprehensive enumeration 56 element fill
status: active                        # pending-xml-parameter-survey | partial-fill-core-elements | active | superseded
template_ref: ./template.fxp.provenance.yaml
patching_model: xml-element-name      # byte-offset (旧 ξ) | xml-element-name (新 π)
template_total_param_count: 558       # π2 survey-params 実測値
allowlist_coverage: "56 / 558 element (= 10.0%、 patch-spec.yaml 主要 field comprehensive coverage)"
allowlist_coverage_design: |
  patch-spec.yaml の 12 必須項目 (= §決定 27 (4)) を XML element name に mapping した結果、
  11 group × 平均 5 element ≒ 56 element 構成。
  覆盖範囲:
    - OSC 1 (12 件 full)        = primary drum tone generator
    - OSC 2 (6 件 minimal)      = noise/click secondary
    - OSC 3 (3 件 minimal)      = optional, typically muted
    - OSC mixer (8 件)          = level + mute for o1/o2/o3/noise
    - Filter 1 (6 件 full)      = main filter
    - Filter 2 (3 件 minimal)   = secondary filter
    - Filter routing (3 件)     = fb_config + balance + lowcut
    - Waveshaper (2 件)         = type + drive
    - AEG (5 件)                = amplitude envelope
    - FEG (5 件)                = filter/pitch envelope
    - Master/scene/noisecol (3) = volume + scene + noise color
  残り 502 件 (= scene B 273 + LFO 156 + FX 系 + mod matrix 等) は default change_protected、
  drum patching に不要 = conservative 安全側維持。 future SD/CYM/HH/TOM/RIM 横展開でも本 56 件で十分。

# ---------------------------------------------------------------------------
# 許可 parameter list (= AI bridge が touch 可能、 XML element name 軸)
# ---------------------------------------------------------------------------
# π2 commit (= XML parameter survey) で fill 予定:
#   (a) template chunk 内 XML を extract
#   (b) <parameters> 要素配下の element 一覧 dump
#   (c) candidate 6 category に該当する element name を allowlist に列挙
#   (d) 各 element の type + valid_range + default_value を XML から確定
allowed_parameters:
  # ★ π3 full fill = patch-spec.yaml 主要 field 対応の core 50 element comprehensive enumeration。
  # 全 element は π2 survey-params + π3 enumeration で実測値 (= template default) 確認済。
  # valid_range は Surge XT 内部単位 (= log-time / log-freq / normalized 等) で仕様詳細は Surge XT docs / source 側、
  # patching layer では template_default_value からの相対 modify として扱うことを想定 (= safety = Surge XT 自体が invalid 値 reject)。
  # 11 group 構成 = (1) OSC1 (2) OSC2 (3) OSC3 (4) OSC mixer (5) Filter1 (6) Filter2 (7) Filter routing (8) Waveshaper (9) AEG (10) FEG (11) Master/scene

  # ===========================================================
  # (1) OSC 1 = a_osc1_* (= 12 件 full、 primary drum tone generator)
  # ===========================================================
  - xml_element_name: a_osc1_type
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[0].type
    notes: "OSC1 type enum (= Surge XT osc 種別: Classic/Sine/Wavetable/FM2/FM3/String/Twist/Alias/AudioIn/S&HNoise 等)"
  - xml_element_name: a_osc1_octave
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[0].pitch_offset_octaves
    notes: "OSC1 octave shift、 integer"
  - xml_element_name: a_osc1_pitch
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[0].base_pitch_offset_semitones
    notes: "OSC1 pitch (= semitone fractional、 extend_range attribute あり)"
  - xml_element_name: a_osc1_param0
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[0].param0
    notes: "OSC1 type-specific param 0 (= 例 Classic = unison count、 Sine = shape mode)"
  - xml_element_name: a_osc1_param1
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[0].param1
    notes: "OSC1 type-specific param 1 (= 例 Classic = unison detune)"
  - xml_element_name: a_osc1_param2
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[0].param2
    notes: "OSC1 type-specific param 2"
  - xml_element_name: a_osc1_param3
    xml_type_value: "2"
    template_default_value: "-60.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[0].param3
    notes: "OSC1 type-specific param 3"
  - xml_element_name: a_osc1_param4
    xml_type_value: "2"
    template_default_value: "70.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[0].param4
    notes: "OSC1 type-specific param 4"
  - xml_element_name: a_osc1_param5
    xml_type_value: "2"
    template_default_value: "0.10000000149012"
    patch_spec_field: oscillator_plan.oscillators[0].param5
    notes: "OSC1 type-specific param 5"
  - xml_element_name: a_osc1_param6
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[0].param6
    notes: "OSC1 type-specific param 6"
  - xml_element_name: a_osc1_keytrack
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[0].keytrack
    notes: "OSC1 keytrack on/off (= drum で typically off 0 検討候補)"
  - xml_element_name: a_osc1_retrigger
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[0].retrigger
    notes: "OSC1 retrigger on/off"

  # ===========================================================
  # (2) OSC 2 = a_osc2_* (= 6 件、 secondary drum element 例 noise/click)
  # ===========================================================
  - xml_element_name: a_osc2_type
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[1].type
    notes: "OSC2 type enum、 drum で typically Sine or S&HNoise"
  - xml_element_name: a_osc2_octave
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[1].pitch_offset_octaves
    notes: "OSC2 octave shift"
  - xml_element_name: a_osc2_pitch
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[1].base_pitch_offset_semitones
    notes: "OSC2 pitch"
  - xml_element_name: a_osc2_param0
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[1].param0
    notes: "OSC2 type-specific param 0"
  - xml_element_name: a_osc2_param1
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[1].param1
    notes: "OSC2 type-specific param 1"
  - xml_element_name: a_osc2_keytrack
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[1].keytrack
    notes: "OSC2 keytrack"

  # ===========================================================
  # (3) OSC 3 = a_osc3_* (= 3 件、 optional reserved for drum、 typically muted)
  # ===========================================================
  - xml_element_name: a_osc3_type
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[2].type
    notes: "OSC3 type、 drum で typically reserved / muted"
  - xml_element_name: a_osc3_pitch
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[2].base_pitch_offset_semitones
    notes: "OSC3 pitch"
  - xml_element_name: a_osc3_octave
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[2].pitch_offset_octaves
    notes: "OSC3 octave"

  # ===========================================================
  # (4) OSC mixer = a_level_* / a_mute_* (= 8 件、 OSC + noise gen mix)
  # ===========================================================
  - xml_element_name: a_level_o1
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[0].amplitude
    notes: "OSC1 mixer level (= 0.0-1.0、 drum body 主成分)"
  - xml_element_name: a_mute_o1
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: oscillator_plan.oscillators[0].mute
    notes: "OSC1 mute (= 0:active / 1:muted)"
  - xml_element_name: a_level_o2
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[1].amplitude
    notes: "OSC2 mixer level"
  - xml_element_name: a_mute_o2
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[1].mute
    notes: "OSC2 mute (= template default = muted、 drum で unmute 必要時 0)"
  - xml_element_name: a_level_o3
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: oscillator_plan.oscillators[2].amplitude
    notes: "OSC3 mixer level"
  - xml_element_name: a_mute_o3
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: oscillator_plan.oscillators[2].mute
    notes: "OSC3 mute (= template default = muted)"
  - xml_element_name: a_level_noise
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: noise_transient_plan.amplitude
    notes: "Noise generator level (= drum click / transient 用)"
  - xml_element_name: a_mute_noise
    xml_type_value: "0"
    template_default_value: "1"
    patch_spec_field: noise_transient_plan.mute
    notes: "Noise mute (= template default = muted、 drum で unmute 必要時 0)"

  # ===========================================================
  # (5) Filter 1 = a_filter1_* (= 6 件 full)
  # ===========================================================
  - xml_element_name: a_filter1_type
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: filter_waveshaper_drive.filter_block.type
    notes: "Filter1 type enum (= Surge XT filter algorithm 種別)"
  - xml_element_name: a_filter1_subtype
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: filter_waveshaper_drive.filter_block.subtype
    notes: "Filter1 subtype (= type 内 variant)"
  - xml_element_name: a_filter1_cutoff
    xml_type_value: "2"
    template_default_value: "3.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_block.cutoff_hz
    notes: "Filter1 cutoff (= Surge XT log-freq scale)"
  - xml_element_name: a_filter1_resonance
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_block.resonance
    notes: "Filter1 resonance (= 0.0-1.0)"
  - xml_element_name: a_filter1_envmod
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_block.envelope_mod_amount
    notes: "Filter1 envelope modulation amount (= FEG 接続深度)"
  - xml_element_name: a_filter1_keytrack
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_block.keytrack_amount
    notes: "Filter1 keytrack amount"

  # ===========================================================
  # (6) Filter 2 = a_filter2_* (= 3 件 minimal、 主要のみ)
  # ===========================================================
  - xml_element_name: a_filter2_type
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: filter_waveshaper_drive.filter2_block.type
    notes: "Filter2 type、 dual-filter 構成時のみ active"
  - xml_element_name: a_filter2_cutoff
    xml_type_value: "2"
    template_default_value: "3.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter2_block.cutoff_hz
    notes: "Filter2 cutoff"
  - xml_element_name: a_filter2_resonance
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter2_block.resonance
    notes: "Filter2 resonance"

  # ===========================================================
  # (7) Filter routing = a_fb_config / a_f_balance / a_lowcut (= 3 件)
  # ===========================================================
  - xml_element_name: a_fb_config
    xml_type_value: "0"
    template_default_value: "7"
    patch_spec_field: filter_waveshaper_drive.filter_routing
    notes: "Filter feedback / routing config enum (= dual-filter 接続 mode)"
  - xml_element_name: a_f_balance
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.filter_balance
    notes: "Filter 1/2 balance (= dual-filter mix)"
  - xml_element_name: a_lowcut
    xml_type_value: "2"
    template_default_value: "-72.00000000000000"
    patch_spec_field: filter_waveshaper_drive.global_lowcut_hz
    notes: "Global lowcut HPF (= drum で DC offset / 低域整理用)"

  # ===========================================================
  # (8) Waveshaper / drive = a_ws_* (= 2 件)
  # ===========================================================
  - xml_element_name: a_ws_type
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: filter_waveshaper_drive.waveshaper_block.type
    notes: "Waveshaper type enum (= 0:off / SoftClip / HardClip / Tube 等)"
  - xml_element_name: a_ws_drive
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: filter_waveshaper_drive.waveshaper_block.drive_db
    notes: "Waveshaper drive amount"

  # ===========================================================
  # (9) AEG = a_env1_* (= 5 件、 amplitude envelope core)
  # ===========================================================
  - xml_element_name: a_env1_attack
    xml_type_value: "2"
    template_default_value: "-8.00000000000000"
    patch_spec_field: amplitude_envelope.attack_ms
    notes: "AEG attack (= Surge XT log-time scale)"
  - xml_element_name: a_env1_decay
    xml_type_value: "2"
    template_default_value: "-2.00000000000000"
    patch_spec_field: amplitude_envelope.decay_ms
    notes: "AEG decay (= drum で primary parameter)"
  - xml_element_name: a_env1_sustain
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: amplitude_envelope.sustain_level
    notes: "AEG sustain (= 0.0-1.0 normalized、 drum で typically 0)"
  - xml_element_name: a_env1_release
    xml_type_value: "2"
    template_default_value: "-5.00000000000000"
    patch_spec_field: amplitude_envelope.release_ms
    notes: "AEG release"
  - xml_element_name: a_env1_mode
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: amplitude_envelope.mode
    notes: "AEG envelope mode (= digital / analog 等)"

  # ===========================================================
  # (10) FEG = a_env2_* (= 5 件、 filter envelope / pitch envelope 代用)
  # ===========================================================
  - xml_element_name: a_env2_attack
    xml_type_value: "2"
    template_default_value: "-8.00000000000000"
    patch_spec_field: pitch_envelope.attack_ms (= FEG 経由)
    notes: "FEG attack、 patch-spec pitch_envelope へ filter envmod 経路で接続"
  - xml_element_name: a_env2_decay
    xml_type_value: "2"
    template_default_value: "-2.00000000000000"
    patch_spec_field: pitch_envelope.duration_ms (= FEG 経由)
    notes: "FEG decay (= drum pitch sweep 期間に対応)"
  - xml_element_name: a_env2_sustain
    xml_type_value: "2"
    template_default_value: "1.00000000000000"
    patch_spec_field: pitch_envelope.sustain_level (= FEG 経由)
    notes: "FEG sustain"
  - xml_element_name: a_env2_release
    xml_type_value: "2"
    template_default_value: "-5.00000000000000"
    patch_spec_field: pitch_envelope.release_ms (= FEG 経由)
    notes: "FEG release"
  - xml_element_name: a_env2_mode
    xml_type_value: "0"
    template_default_value: "0"
    patch_spec_field: pitch_envelope.mode (= FEG 経由)
    notes: "FEG mode"

  # ===========================================================
  # (11) Master / scene volume / noise color (= 3 件)
  # ===========================================================
  - xml_element_name: volume
    xml_type_value: "2"
    template_default_value: "-9.68199920654297"
    patch_spec_field: output_constraint.peak_target_dbfs (= 整合 必要時)
    notes: "Master output volume (= dB)、 §決定 26 (4) peak target 整合"
  - xml_element_name: a_volume
    xml_type_value: "2"
    template_default_value: "0.89089900255203"
    patch_spec_field: oscillator_plan.scene_master_amplitude
    notes: "Scene A master volume"
  - xml_element_name: a_noisecol
    xml_type_value: "2"
    template_default_value: "0.00000000000000"
    patch_spec_field: noise_transient_plan.color
    notes: "Noise color (= -1.0 brown / 0.0 white / 1.0 pink/violet 等、 drum click character)"

  # 合計: 12 + 6 + 3 + 8 + 6 + 3 + 3 + 2 + 5 + 5 + 3 = 56 element
  # 残り未 enumerate (= 558 - 56 = 502 件): scene B 273 件 + LFO 156 件 + FX 系 + modulation matrix 等
  # 全部 default で change_protected (= AI bridge は touch しない)、 conservative 安全側維持。
  # π4 patch subcommand 実装時、 allowed_parameters[] に enumerate された 56 件のみ
  # XML element value 修正を allow、 それ以外は touch しない (= byte-identical 維持 verify)。

# ---------------------------------------------------------------------------
# 候補 parameter (= 越川氏 audition で確定、 §決定 26 (5) + §決定 27 推奨 baseline)
# ---------------------------------------------------------------------------
# template + parameter patching で全 6 drum 種 (= BD/SD/TOP/HH/TOM/RIM) を表現するための
# 最小 parameter set 候補。 越川氏 hand-on 時にこの中から「実 patching 対象」 を選別。
candidate_parameters_for_allowlist:
  - category: oscillator
    parameters:
      - osc1_waveform           # OSC type (= Classic / Sine / FM2 等の選択)
      - osc1_pitch_offset       # pitch base shift
      - osc1_amplitude          # OSC 1 gain
      - osc2_waveform
      - osc2_pitch_offset
      - osc2_amplitude
  - category: amp_envelope
    parameters:
      - amp_envelope_attack     # AHDSR A
      - amp_envelope_hold       # AHDSR H
      - amp_envelope_decay      # AHDSR D
      - amp_envelope_sustain    # AHDSR S
      - amp_envelope_release    # AHDSR R
  - category: pitch_envelope
    parameters:
      - pitch_envelope_amount   # pitch env modulation depth
      - pitch_envelope_decay    # pitch env decay ms
  - category: filter
    parameters:
      - filter1_cutoff_hz       # LP cutoff
      - filter1_resonance       # filter Q
      - filter1_envelope_amount
  - category: waveshaper_drive
    parameters:
      - waveshaper_drive_db     # saturation amount
  - category: master
    parameters:
      - master_gain             # patch level (= -6 〜 -3 dBFS peak 整合)

# ---------------------------------------------------------------------------
# 禁止領域 (= 永久 change_protected、 §決定 27 ξ/π scope-out 連動)
# ---------------------------------------------------------------------------
prohibited_byte_ranges:
  - range: [0, 28]
    description: "VST2 container header (= CcnK + byteSize + fxMagic + version + idUint + fxVersion + count)"
    reason: "§決定 27 ξ scope-out: full binary RE 最小限維持、 container 軸は touch 不可"
  - range: [56, 60]
    description: "FPCh chunkByteSize (= patch chunk size header)"
    reason: "XML patching で byte size 変動時は再計算、 それ以外は不変"
  - range: [60, 92]
    description: "FPCh chunk sub3 magic + 28 byte binary header"
    reason: "Surge XT 内部 chunk format marker、 AI bridge は touch しない (= 「bridge, not full synthesizer patch compiler」 軸)"
  # ★ ο1 「chunk 末尾 8 byte trailing」 entry を π2 で削除:
  # verify-repack 実測で trailing = 0 byte 確認、 protected zone 不要。

prohibited_xml_elements:
  - xml_path: "/patch/meta/license"
    description: "license element、 CC0 narrative 維持 = bridge で書換禁止"
  - xml_path: "/patch/meta/author"
    description: "author element、 Surge Synth Team 由来表記維持"
  - xml_path: "/patch[@revision]"
    description: "patch revision attribute、 Surge XT 内部 schema version 識別子、 触らない"

allowed_xml_modifications:
  - xml_path: "/patch/meta/name"
    description: "drum-specific name で書換可 (= 例 'Init Sine' → 'PMDNEO 2608 BD candidate')"
    note: "string replace、 byte size 不変なら chunkByteSize 再計算不要"
  - xml_path: "/patch/meta/category"
    description: "category 書換可 (= 例 'Templates' → 'PMDNEO Drum')"

# ---------------------------------------------------------------------------
# patching 規律 (= AI bridge が遵守する rule、 XML 軸 + binary 軸)
# ---------------------------------------------------------------------------
patching_discipline:
  - "XML allowlist 外の element は **完全に touch しない** (= XML serialize で byte-identical 維持)"
  - "XML allowlist 内の element の value attribute のみ修正 (= 他 attribute 不変)"
  - "valid_range 外の値は **reject** (= patch-spec の value validation in bridge layer)"
  - "XML 修正後 byte size 変動なら chunkByteSize + VST2 byteSize の 2 か所再計算 (= chunkByteSize + 8 = byteSize 維持)"
  - "patching 失敗時は `.fxp` を作らず error exit (= 「engineering candidate before aesthetic judgement」 整合)"
  - "patching 前後で prohibited_xml_elements + prohibited_byte_ranges が byte-identical であることを verify"
  - "trailing binary (= chunk 末尾 8 byte) は **完全に保存** (= XML 後の Surge XT 内部 binary 領域、 corruption 回避)"

# ---------------------------------------------------------------------------
