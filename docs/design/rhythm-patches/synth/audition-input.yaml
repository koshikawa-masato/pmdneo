# Audition input (= π14 candidate list、 π15 越川氏 scoring 待ち)
# ============================================================================
#
# 8 candidates for human aesthetic audition (= 1-5 score)。
# 採点後、 `feature_search.py audition-check` で metric_v2 score との Spearman correlation 計算、
# |r| > 0.7 で metric_v2 採用可、 < 0.7 なら metric_v3 calibration へ。
#
# 採点基準 (= 越川氏 directive):
#   1 = BD として全く不可
#   2 = BD っぽさは少しあるが採用不可
#   3 = 方向性はあるが要改善
#   4 = かなり良い、採用候補
#   5 = PMDNEO BD として採用可能
#
# 試聴 command:
#   for i in 01 02 03 04 05 06 07 08; do
#       echo "=== candidate_$i ==="
#       afplay ~/Projects/surge-spike/test-assets/audition_candidates/candidate_$i.wav
#       sleep 1
#   done
#
# または個別:
#   !afplay ~/Projects/surge-spike/test-assets/audition_candidates/candidate_03.wav
#
# 採点後の invoke:
#   python3 scripts/feature_search.py audition-check \
#       docs/design/rhythm-patches/synth/audition-input.yaml \
#       --scores "5,1,4,3,3,4,2,2" \   # ← 8 scores 順番に
#       --output docs/design/rhythm-patches/synth/audition-output.yaml
#
# ============================================================================

