# ===========================================================================
# Methodology note (= ADR-0033 §決定 27 (12) π13 中核 wording 遵守)
# ===========================================================================
methodology:
  purpose: "metric_v2 が human aesthetic 軸と相関するか optimize 実行前に literal verify"
  scoring_protocol:
    - "8 candidate を順番に afplay で試聴 (= 必要なら repeat)"
    - "各 candidate に 1-5 score を付与 (= 採点基準 上記)"
    - "scoring の盲性 = candidate 01 (= target) と 02 (= 既聴 NG) は anchor として bias 受容、 03-08 は new candidates"
  correlation_method:
    name: "Spearman rank correlation (= rank-based、 monotonic 関係を測定、 線形性不要)"
    expected_sign: "negative (= human 高 score → metric 低 score = 距離小)"
    threshold_abs_r: 0.7
    interpretation:
      strong_negative: "|r| > 0.7 and r < 0 → metric_v2 採用可、 π16 optimize 着手"
      strong_positive: "|r| > 0.7 and r > 0 → metric weight 符号 inverted、 直すか metric_v3 再設計"
      weak: "|r| < 0.7 → metric_v2 採用不可、 metric_v3 calibration へ"
  next_step_decision_tree:
    - "correlation pass: π16 optimize subcommand を feature-rules-v2.yaml で再 invoke"
    - "correlation fail: feature 追加 (= 例 spectral_rolloff / chroma / tempo) or weight 再設計 + π15 再 audition"
  wording_discipline:
    - "「current metric correlation = 0.XX」 のみ literal、 「metric が aesthetic を捉えた」 等の含意 wording 禁止"
    - "metric pass alone は越川氏 final accept を保証しない、 audition correlation check は前段 gate のみ"
