    note: "step_2 完了後、 fxp2wav-surge external producer で deterministic render。 AI self-analysis 通過までは「candidate wav」 扱い、 全 10 項目 PASS で `analysis-passed` 認定。 sha256 + seed + render command 記録。"
  step_4_ai_self_analysis:        # ν 新規 (= §決定 27 (5) + (7))
