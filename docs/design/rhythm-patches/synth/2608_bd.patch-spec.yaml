  wav: assets/drum_samples/synth/2608_bd.wav
  analysis_report: docs/design/rhythm-patches/synth/2608_bd.analysis-report.yaml  # ν 新規
  adpcma: assets/sounds/adpcma/2608_bd_self.adpcma
  provenance_manifest: TBD (= sub-sprint β BD chain 内で確定)

# ===========================================================================
# acceptance workflow (= §決定 27 (6) ν 再定義 11 step chain)
# ===========================================================================
# ν 中核 wording = 「acceptance は downstream、 upstream ではない」
# = machine-checkable quality gate (= AI self-analysis 10 項目) + human aesthetic final gate (= 越川氏)
#
#  1. AI candidate 提示 (= 本 file が candidate-pending-render-analysis stage)
#  2. AI/toolchain bridge (= patch-spec → template `.fxp` parameter allowlist patching、 §決定 27 (1) AI 役割 2 軸、 §決定 26 spec 整合 verify、 「bridge, not full synthesizer patch compiler」)
#  3. AI/toolchain orchestrated wav render (= fxp2wav-surge external producer invoke、 §決定 27 (1) AI 役割 3 軸、 deterministic `.wav (candidate)` 生成)
#  4. AI self-analysis (= §決定 27 (5) 10 項目検査、 `analysis-report.yaml` 生成)
#  5. AI revision proposal (= engineering FAIL 時のみ、 検査結果に基づく調整案)
#  6. 必要なら patch-spec / `.fxp` 再調整 → step 3 へ loop (= engineering 全通過まで iterate)
#  7. AI self-analysis 全項目 PASS = `engineering_pass: passed` = `.wav (analysis-passed)` 認定
#  8. superctr/adpcm encode (= `.adpcma` 生成、 superctr/adpcm `ae -a` direct invoke)
#  9. MAME / audio gate (= 必要に応じて driver fixture 差替で trigger 確認、 runtime regression 防衛)
# 10. 越川氏 audition / edit / accept (= aesthetic / musical judgement、 final gate)
# 11. accept 後 = `aesthetic_acceptance: accepted` + signature + ι commit (= 並行配置、 既存 fixture 非破壊)
#
# engineering pass ≠ aesthetic accept (= 別軸、 順序関係 = engineering 先 / aesthetic 後 literal)
# engineering FAIL なら越川氏 audition なし (= revision loop で先に engineering 修正)
# engineering PASS かつ aesthetic REJECT は valid (= 越川氏は signal が綺麗でも musical に reject 可能)

