validity_status:
  status: invalid_input_interpretation
  detected_at: '2026-05-17'
  retention_policy: keep as failure evidence、 do not use for downstream decisions
  false_claims_to_retract:
  - '"越川氏 audition と完全一致" は false (= ranking と acceptance の混同が原因)'
  - '"越川氏 が好む順序" wording は invalid (= preference model output は relative distance only)'
  - '"candidate_01 強さ 0.9864" を「採用候補として best」 と解釈してはならない'
  - '"train_accuracy 1.0" は input interpretation failure 下での artifact、 model semantics の validation ではない'
  root_cause:
  - こちらの input schema 設計が不十分 = relative ranking と absolute acceptance を別軸として扱う field がなかった
  - こちらの interpretation 誤り = rejected: [] を「reject 入力 step 未実行」 ではなく「全 candidate accept」 と
    false 解釈
  - reject prompt の wording 「BD として明らかに不可」 が absolute acceptance gate を捉え損ねた = 越川氏 が「相対的にマシ」
    だが「全部 reject」 と判断する余地を schema が表現できなかった
  true_state:
  - all 8 candidates = aesthetic_rejected (= 越川氏 audition、 acceptance_status.global_reject_all = true)
  - no accepted candidate exists yet
  - preference model output (= ranking_best_first 等) は relative ranking のみ、 acceptance gate ではない
  - asset acceptance decision はこの report からは取得不可
  literal_rules_to_internalize:
  - relative preference (= A is better than B) ≠ candidate acceptance (= A is acceptable)
  - pairwise ranking is auxiliary to acceptance gate
  - all candidates can be globally rejected even if pairwise preferences exist
  - 3 軸独立 = pairwise relative ranking / individual absolute acceptance / global reject all
  - preference model is not the accepted asset selector / 越川氏 aesthetic gate is authoritative
  retained_content_note: 下記 metadata / dataset_summary / model_quality / candidate_predicted_preference
    / feature_importance_top5 / training_pairs / scaler_params / model_coefficients は failure analysis
    用 evidence として保持。 越川氏 から「relative ranking と absolute acceptance を混同するな」 規律学習の literal
    教材として残す。 downstream decisions (= optimize objective / asset selection / acceptance gate) に
    使用してはならない。
  next_action: π15.5 corrective commit で input schema + script + ADR + memory + investigation doc 修正、
    次の audition flow は acceptance gate primary + pairwise relative auxiliary の 2 軸 protocol で実施。

