  attribution_required: false      # CC0 dedicates to public domain、 attribution は不要 (但し本 file で literal narrative 維持)
  redistribution: "allowed without restriction (= CC0)"
  rationale: |
    Surge XT factory Templates/Init Sine.fxp は CC0 dedication (= Surge Synth Team による
    public domain release)。 PMDNEO の GPL-3.0 narrative と矛盾せず、 越川氏 100% 著作物
