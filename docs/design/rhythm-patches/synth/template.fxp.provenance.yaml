# Template `.fxp` provenance record (= ADR-0033 §決定 27 (9) ξ artifact)
# ============================================================================
#
# 本 file は `2608_template.fxp` の由来 / hash / 変更禁止領域 / patching 範囲を記録する。
# 越川氏 hand-on で template `.fxp` 作成後に values fill、 全 6 drum 種 (= BD/SD/TOP/HH/TOM/RIM)
# 共通 base として扱う。
#
# 関連 ADR / §決定:
#   - ADR-0033 §決定 22  (= Surge XT install = Homebrew cask 1.3.4)
#   - ADR-0033 §決定 25  (= fxp2wav-surge external producer)
#   - ADR-0033 §決定 26  (= .fxp authoring spec 7 軸)
#   - ADR-0033 §決定 27 (1)  (= AI 役割 2 軸 = template-based bridge)
#   - ADR-0033 §決定 27 (9)  (= ξ artifact path canonical)
#   - ADR-0033 §決定 27 (11) (= ξ scope-in literal 5 件)
#
# ============================================================================

# ---------------------------------------------------------------------------
# template metadata
# ---------------------------------------------------------------------------
template_filename: 2608_template.fxp
template_path: assets/drum_samples/synth/templates/2608_template.fxp
status: pending-hand-on          # pending-hand-on | created | superseded
provenance_version: "0.1.0"      # 本 provenance schema 自体の version

# ---------------------------------------------------------------------------
# 越川氏 hand-on 記録 (= §決定 27 ξ template 作成は越川氏唯一の engineering 接点)
# ---------------------------------------------------------------------------
provenance:
  source: pending                # hand-on 完了時 fill: "越川氏 Surge XT GUI hand-on"
  base_design_intent: pending    # hand-on 完了時 fill: 「全 6 drum 共通 neutral base + AHDSR + 1 osc + 1 filter + 1 drive」 等
  template_hash_sha256: null     # hand-on 完了後計算: sha256 of 2608_template.fxp
  surge_xt_version: null         # hand-on 環境: e.g. "1.3.4"
  surge_xt_install_path: /opt/homebrew/Caskroom/surge-xt/1.3.4  # §Annex A-7 η literal
  author: 越川将人 / M.Koshikawa.
  created_at: null               # ISO 8601 date、 hand-on 完了時 fill (例: "2026-05-16")
  patch_display_name: pending    # 例: "PMDNEO 2608 Template v0"

# ---------------------------------------------------------------------------
# 変更禁止領域 (= AI bridge が touch 不可、 §決定 27 ξ scope-out 連動)
# ---------------------------------------------------------------------------
change_protected_zones:
  - description: VST2 header (= chunkMagic / byteSize / fxMagic / version / idUint / fxVersion / count)
    byte_range: [0, 28]
    reason: "VST2 spec compliant container header、 AI bridge は touch しない (= §決定 27 ξ scope-out: full binary RE 最小限維持)"
  - description: programName field (= FPCh body 先頭)
    byte_range: [28, 56]
    reason: "drum-specific name は AI bridge が string replace するが、 template 自体の programName は越川氏 hand-on で固定、 byte 範囲不変"
  - description: FPCh chunkByteSize (= patch chunk size header)
    byte_range: [56, 60]
    reason: "chunk size、 parameter patching が同一 byte size 維持なら不変 (= §決定 27 ξ bridge wording 整合)"
  - description: FPCh patchChunk header 部 (= XML root element / patch metadata 等の structural region)
    byte_range: pending           # hand-on 後の binary inspection で確定
    reason: "Surge XT 内部仕様の structural region、 AI bridge は touch しない (= 「bridge, not full synthesizer patch compiler」 軸)"

# ---------------------------------------------------------------------------
# patching allowlist 参照 (= ξ artifact 別 file)
# ---------------------------------------------------------------------------
patching_allowlist_ref: ./parameter-allowlist.yaml
# 実 byte offset / parameter name は parameter-allowlist.yaml に literal 記録
# AI bridge が touch する parameter は allowlist で明示的に enumerate
# allowlist 外の byte は全部 change_protected (= conservative default)

# ---------------------------------------------------------------------------
# template scope (= 越川氏 hand-on 時の判断指針)
# ---------------------------------------------------------------------------
template_scope_recommendation:
  - "全 6 drum 種 (= BD/SD/TOP/HH/TOM/RIM) 共通 base + drum-specific は parameter patching で表現"
  - "必要最小限 parameter set (= OSC + AHDSR + filter + drive) で base 構成"
  - "§決定 26 (5) Surge XT 内蔵 only 整合 (= external sample / VST 3rd party 不使用)"
  - "§決定 26 (5) deterministic 整合 (= random / drift / unseeded modulation 全排除)"
  - "§決定 24 aesthetic 整合 (= OPNA / retro FM-ADPCM、 short decay、 bright transient)"
  - "patching allowlist 範囲で全 drum 表現可能な最小 parameter set を目指す"

# ---------------------------------------------------------------------------
# 関連 artifact
# ---------------------------------------------------------------------------
related_artifacts:
  template_fxp: assets/drum_samples/synth/templates/2608_template.fxp
  patching_allowlist: docs/design/rhythm-patches/synth/parameter-allowlist.yaml
  investigation_doc: docs/design/rhythm-patches/synth/SURGE_XT_FXP_BRIDGE_INVESTIGATION.md
  bridge_spike: scripts/fxp_template_patch.py
  example_consumer_patch_spec: docs/design/rhythm-patches/synth/2608_bd.patch-spec.yaml

# ---------------------------------------------------------------------------
# version history
# ---------------------------------------------------------------------------
version_history:
  - version: "0.1.0"
    date: "2026-05-16"
    status: schema-placeholder (= ο commit、 越川氏 hand-on 待ち)
    author: "Claude Opus 4.7 (1M context)"
    note: "schema 雛形のみ作成、 actual values は越川氏 hand-on で fill (= §決定 27 ξ template 作成 1 度のみ)。"
