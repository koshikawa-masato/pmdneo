  patch_revision: 22                # XML <patch revision="22"> 内記録
  internal_format: "VST2 FXP container (28 byte BE header) + FPCh custom chunk (28 byte programName + 4 byte chunkByteSize + sub3 magic + 28 byte binary header + XML body + 8 byte trailing binary)"

# ---------------------------------------------------------------------------
# 変更禁止領域 (= AI bridge が touch 不可、 §決定 27 ξ/π scope-out 連動)
# ---------------------------------------------------------------------------
change_protected_zones:
  - description: VST2 header (= chunkMagic / byteSize / fxMagic / version / idUint / fxVersion / count)
    byte_range: [0, 28]
    reason: "VST2 spec compliant container header、 AI bridge は touch しない (= §決定 27 ξ scope-out: full binary RE 最小限維持)"
  - description: programName field (= FPCh body 先頭)
    byte_range: [28, 56]
    reason: "drum-specific name は AI bridge が string replace 可能 (= 例 'Init Sine' → 'PMDNEO 2608 BD'、 但し 28 byte 内に収める)、 byte 範囲不変"
  - description: FPCh chunkByteSize (= patch chunk size header)
    byte_range: [56, 60]
    reason: "chunk size、 parameter patching が XML byte size 維持なら不変、 size 変動時は byteSize 再計算 (= chunkByteSize + 8 が VST2 header byteSize)"
  - description: FPCh chunk sub3 magic + 28 byte binary header
    byte_range: [60, 92]
    reason: "Surge XT 内部 chunk format marker、 AI bridge は touch しない (= 「bridge, not full synthesizer patch compiler」 軸)"
  - description: FPCh chunk trailing binary (= chunk 末尾 8 byte)
    byte_range: [31530, 31538]    # = template byte_size 末尾 8 byte
    reason: "XML body の後ろの binary 領域、 Surge XT 内部用途 (= checksum or padding 想定)、 AI bridge は touch しない"

# ---------------------------------------------------------------------------
# XML 内 patching 可能領域 (= π refinement = byte offset ではなく XML element name)
# ---------------------------------------------------------------------------
xml_patching_zone:
  byte_range: [92, 31530]          # = sub3 header 後 〜 trailing binary 前
  xml_offset_in_chunk: 32          # = chunk[32:chunk_size-8] が XML body
  xml_root_element: patch
  xml_root_attributes:
    revision: "22"
  xml_meta_section_path: "/patch/meta"
  xml_parameters_section_path: "/patch/parameters"
  patching_method: "XML element value attribute 修正 (= 例 <volume_FX1 value=\"X\" /> の X 修正)"
  patching_safety: "XML parse でき + allowlist 内 element のみ修正 + serialize 後 byte size 一致なら trailing binary 不変、 一致しなければ chunkByteSize + byteSize 再計算"

# ---------------------------------------------------------------------------
# patching allowlist 参照 (= ξ/π artifact 別 file)
# ---------------------------------------------------------------------------
patching_allowlist_ref: ./parameter-allowlist.yaml
# π refinement = parameter は XML element name (= 例 a_amp_env_decay) で識別
# AI bridge が touch する XML element は allowlist で明示的に enumerate
# allowlist 外の XML element + 全 byte は change_protected (= conservative default)

