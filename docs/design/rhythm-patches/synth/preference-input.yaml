# Preference learning input (= π15 越川氏 pairwise comparison + reject template)
# ============================================================================
#
# π15 directive (= 2026-05-17 越川氏):
#   "feature matching alone does not model human aesthetic preference"
#   "metric correlation is not preference learning"
#
# π14 audition-check (= 1-5 score + Spearman correlation) は metric calibration のみで、
# 越川氏 aesthetic preference の学習にはならない。 本 file は preference learning の input、
# pairwise comparison + reject label の dataset を構築する。
#
# 越川氏 input flow:
#   1. 各 pair (= 全 28 件 enumerate 済) の A と B を afplay で聴き比べ
#   2. preference field に "A" / "B" / "tie" のいずれかを literal 入力
#   3. 「明らかに BD として不可」 candidate は rejected list に id を追加
#   4. 20 pair 程度で十分 (= 全 28 可能なら最強)
#
# 採点 command 例:
#   !afplay ~/Projects/surge-spike/test-assets/audition_candidates/candidate_03.wav
#   !afplay ~/Projects/surge-spike/test-assets/audition_candidates/candidate_05.wav
#   # candidate_03 と candidate_05 を聴き比べて、 BD として良い方を選ぶ
#   # 例: candidate_03 の方が良い → pair_NN の preference: "A"
#
# 越川氏 fill 完了後:
#   python3 scripts/feature_search.py preference-learn \
#       docs/design/rhythm-patches/synth/preference-input.yaml \
#       --output docs/design/rhythm-patches/synth/preference-model-report.yaml
#
# ============================================================================

target_drum_type: BD
candidate_features_source: scripts/feature_search.py extract_features (= v2 with MFCC
  / log-mel / etc)
audition_protocol:
  step_1_listen: afplay ~/Projects/surge-spike/test-assets/audition_candidates/candidate_XX.wav
  step_2_compare: 各 pair で A (= 1 件目) と B (= 2 件目) を聴き比べ
  step_3_label: preference field に A / B / tie / reject_A / reject_B を記入
  step_4_reject: 「明らかに BD として不可」 candidate は rejected section に id を追加 = 全 candidate
    より劣ると扱う
  minimum_pairs: 20 pair 程度で十分 (= 越川氏 directive)、 28 全 pair 可能なら最強
