methodology_note:
  shift_from_pi14: π14 = metric correlation (= absolute 1-5 score + Spearman) was metric calibration, not preference learning
  pi15_principle: human preference is the primary objective、 feature distance is auxiliary
  model: logistic pairwise ranking via sklearn LogisticRegression on standardized feature differences
  feature_set: scalar features only (= 20 dim、 vector feature 含めず robust = 過学習回避)
  training_strategy: winner - loser → 1、 mirror → 0、 rejected ID は全 non-rejected より劣ると仮定して pair 追加
wording_discipline:
- feature matching alone does not model human aesthetic preference
- metric correlation is not preference learning
- human preference is the primary objective
- feature distance is auxiliary
- optimizer is not final selector; preference model is also not final selector
- 越川氏 aesthetic gate remains authoritative
next_step_after_filling:
  command: python3 scripts/feature_search.py preference-learn docs/design/rhythm-patches/synth/preference-input.yaml --output
    docs/design/rhythm-patches/synth/preference-model-report.yaml
  expected_artifact: preference-model-report.yaml = logistic coefficients + per-candidate predicted preference + feature importance
    + training accuracy
