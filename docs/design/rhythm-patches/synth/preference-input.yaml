target_drum_type: BD
candidate_features_source: scripts/feature_search.py extract_features (= v2 with MFCC / log-mel / etc)
audition_protocol:
  step_1_listen: afplay ~/Projects/surge-spike/test-assets/audition_candidates/candidate_XX.wav
  step_2_compare_relative: 各 pair で A (= 1 件目) と B (= 2 件目) を聴き比べ (= relative ranking のみ、 acceptance ではない)
  step_3_label_pairwise: preference field に A / B / tie を記入 (= relative judgment のみ、 採用可否ではない)
  step_4_absolute_acceptance: 全 candidate audition 後に acceptance_status section を fill = absolute acceptance gate を別軸で記録
  minimum_pairs: 20 pair 程度で十分 (= 越川氏 directive)、 28 全 pair 可能なら最強
three_axis_separation:
  axis_1_pairwise_relative: 「A は B よりマシ」 = preferences.pairs section、 relative ranking only
  axis_2_individual_acceptance: 各 candidate を「BD として採用可能か」 = acceptance_status.accepted_candidates / rejected_candidates、 absolute gate
  axis_3_global_reject: 全 candidate を一括 reject = acceptance_status.global_reject_all = true
  literal_rule: relative preference (= A is better than B) ≠ candidate acceptance (= A is acceptable)、 axis 1 / 2 / 3 は独立、 全 candidate に pairwise preference があっても global reject 可能
acceptance_status:
  global_reject_all: true
  accepted_candidates: []
  rejected_candidates:
  - candidate_01
  - candidate_02
  - candidate_03
  - candidate_04
  - candidate_05
  - candidate_06
  - candidate_07
  - candidate_08
  notes: '8 candidate 全部 aesthetic_rejected (= 23rd session 越川氏 audition の真意、 π15.5 input interpretation
    failure 修正で literal 反映)。 preferences.pairs (= 下記 28 件 A/B/tie) は relative ranking only、 採用可否
    judgment ではない。 ranking と acceptance の混同は input schema 設計の不十分が原因 (= 旧 schema は rejected
    section 1 つで「明らかに不可」 wording に偏重し、 absolute acceptance gate を独立軸として扱えなかった)。
    preference model output (= preference-model-report.yaml) は relative distance のみ、 asset acceptance
    decision には invalid。 next audition flow = 新規 candidate set 2 を生成 + audition v2 protocol (= acceptance
    gate primary / pairwise relative auxiliary) で実施。'
